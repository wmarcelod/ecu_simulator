<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECU Simulator - WebSocket Client Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .section:last-child {
            border-bottom: none;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-indicator.connected {
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #4ade80;
            color: white;
        }

        .btn-success:hover {
            background: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .log {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-left: 3px solid #667eea;
            border-radius: 2px;
        }

        .log-entry.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .log-entry.success {
            border-left-color: #4ade80;
            background: #f0fdf4;
        }

        .log-time {
            color: #999;
            font-size: 11px;
            margin-right: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .button-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }

        .info {
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #0369a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ECU Simulator WebSocket Client</h1>

        <div class="section">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Connection</h2>
            <div class="status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Disconnected</span>
            </div>
            <div class="form-group">
                <label>Server URL</label>
                <input type="text" id="serverUrl" value="ws://localhost:8000/ws">
            </div>
            <div class="form-group">
                <label>Session ID</label>
                <input type="text" id="sessionId" placeholder="Will be generated if empty" value="">
            </div>
            <div class="button-group">
                <button class="btn-primary" onclick="connectWebSocket()">Connect</button>
                <button class="btn-danger" onclick="disconnectWebSocket()">Disconnect</button>
                <button class="btn-secondary" onclick="clearLog()">Clear Log</button>
            </div>
        </div>

        <div class="section">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Send Command</h2>
            <div class="info">
                Enter the command parameters and click "Send Command" to test the WebSocket connection.
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>Command Type</label>
                    <select id="commandType">
                        <option>OBD2</option>
                        <option>UDS</option>
                        <option>CAN</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mode</label>
                    <select id="modeSelect">
                        <option>virtual</option>
                        <option>hardware</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Command (hex)</label>
                <textarea id="commandInput" placeholder="e.g., 01 00 or 2201F1 or 101 00">01 00</textarea>
            </div>
            <div class="button-group">
                <button class="btn-success" onclick="sendCommand()">Send Command</button>
                <button class="btn-secondary" onclick="sendHeartbeat()">Send Heartbeat</button>
            </div>
        </div>

        <div class="section">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Message Log</h2>
            <div class="log" id="messageLog">
                <div class="log-entry">Ready to connect...</div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let sessionId = null;
        const pendingCommands = new Map();

        function generateId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            if (connected) {
                indicator.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                indicator.classList.remove('connected');
                text.textContent = 'Disconnected';
            }
        }

        function addLog(message, type = 'info') {
            const log = document.getElementById('messageLog');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
            entry.innerHTML = `<span class="log-time">${time}</span>${escapeHtml(message)}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function clearLog() {
            document.getElementById('messageLog').innerHTML = '';
            addLog('Log cleared');
        }

        function connectWebSocket() {
            const url = document.getElementById('serverUrl').value;
            sessionId = document.getElementById('sessionId').value || generateId();
            document.getElementById('sessionId').value = sessionId;

            addLog(`Connecting to ${url}...`);

            ws = new WebSocket(url);

            ws.onopen = () => {
                addLog('Connected to server', 'success');
                updateStatus(true);

                ws.send(JSON.stringify({
                    type: 'status',
                    connectionType: 'browser',
                    sessionId: sessionId
                }));
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                addLog(`Received: ${JSON.stringify(message)}`);

                if (message.type === 'response' && message.commandId) {
                    const cmd = pendingCommands.get(message.commandId);
                    if (cmd) {
                        addLog(`Response received in ${message.responseTime}ms`, 'success');
                        pendingCommands.delete(message.commandId);
                    }
                }
            };

            ws.onerror = (error) => {
                addLog(`Error: ${error.message || 'Unknown error'}`, 'error');
            };

            ws.onclose = () => {
                addLog('Disconnected from server', 'error');
                updateStatus(false);
            };
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                updateStatus(false);
            }
        }

        function sendCommand() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('Not connected to server', 'error');
                return;
            }

            const commandType = document.getElementById('commandType').value;
            const command = document.getElementById('commandInput').value.trim();
            const mode = document.getElementById('modeSelect').value;
            const commandId = generateId();

            if (!command) {
                addLog('Please enter a command', 'error');
                return;
            }

            const message = {
                type: 'command',
                commandId: commandId,
                sessionId: sessionId,
                commandType: commandType,
                command: command,
                mode: mode
            };

            pendingCommands.set(commandId, {
                type: commandType,
                command: command,
                timestamp: Date.now()
            });

            addLog(`Sending ${commandType} command: ${command}`);
            ws.send(JSON.stringify(message));
        }

        function sendHeartbeat() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('Not connected to server', 'error');
                return;
            }

            ws.send(JSON.stringify({
                type: 'heartbeat'
            }));

            addLog('Heartbeat sent');
        }

        // Initialize
        updateStatus(false);
        document.getElementById('sessionId').value = generateId();

        // Allow Enter key to send command
        document.getElementById('commandInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendCommand();
            }
        });
    </script>
</body>
</html>
