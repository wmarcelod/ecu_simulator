version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8000
      HOST: 0.0.0.0
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/health').then(r=>{if(!r.ok)throw 1;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dokploy-network
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_WS_URL: ${VITE_WS_URL:-wss://ecu.marcelod.com.br/ws}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ecu-simulator.rule=Host(`ecu.marcelod.com.br`)"
      - "traefik.http.routers.ecu-simulator.entrypoints=websecure"
      - "traefik.http.routers.ecu-simulator.tls.certresolver=letsencrypt"
      - "traefik.http.services.ecu-simulator.loadbalancer.server.port=80"
    networks:
      - dokploy-network
      - internal

volumes:
  backend-data:

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
