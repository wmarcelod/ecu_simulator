version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8000
      HOST: 0.0.0.0
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/health').then(r=>{if(!r.ok)throw 1;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dokploy-network
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_WS_URL: ${VITE_WS_URL:-wss://ecu.marcelod.com.br/ws}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true
    networks:
      - dokploy-network
      - internal

volumes:
  backend-data:

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
